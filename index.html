<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endgame</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>

<body>
    <div id="header">
        <h1>ENDGAME</h1>
        <nav id="nav-buttons">
            <button class="nav-button active" data-view="story">Story</button>
            <button class="nav-button" data-view="money">Money</button>
            <button class="nav-button" data-view="map">Map</button>
            <button class="nav-button" data-view="yap">Yap</button>
        </nav>
        <div id="wallet-section">
            <button id="register-name" class="header-button" style="display: none;">Register Name</button>
            <span id="wallet-display">Not connected</span>
            <button id="wallet-button" class="header-button">Connect Wallet</button>
        </div>
    </div>

    <!-- Story View -->
    <div id="story-view" class="view-section">
        <div id="content"></div>
        <div id="choices"></div>
    </div>

    <!-- Money View -->
    <div id="money-view" class="view-section" style="display: none;">
        <div class="auction-section">
            <div class="auction-box">
                <h3 class="center-text">Required Tokens</h3>
                <div id="current-bid" class="center-text"></div>
            </div>
            <button id="sacrifice-button" class="action-button">SACRIFICE</button>
            <div class="auction-box">
                <h3 class="center-text">Auction Pot</h3>
                <div id="treasury-display" class="center-text"></div>
            </div>
        </div>
        <div class="balance-section">
            <div class="balance-container">
                <div class="balance-box">
                    <h3 class="center-text">Your END</h3>
                    <div id="token-balance" class="center-text"></div>
                </div>
                <button id="withdraw-button" class="action-button">WITHDRAW</button>
                <div class="balance-box">
                    <h3 class="center-text">Your ETH</h3>
                    <div id="ether-balance" class="center-text"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Nexus creation modal -->
    <div id="nexus-modal" class="modal">
        <div class="modal-content">
            <h2>Create New Nexus</h2>
            <div class="form-group">
                <label for="nexus-content">Content:</label>
                <textarea id="nexus-content" maxlength="2048" rows="6"></textarea>
                <div class="character-count">0/2048</div>
            </div>
            <div class="modal-buttons">
                <button id="submit-nexus">Submit (0.00004 ETH)</button>
                <button id="cancel-nexus">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Optio creation modal -->
    <div id="optio-modal" class="modal">
        <div class="modal-content">
            <h2>Link Nexuses</h2>
            <div class="form-group">
                <label for="optio-content">Choice Text:</label>
                <textarea id="optio-content" maxlength="2048" rows="6"></textarea>
                <div class="character-count">0/2048</div>
            </div>
            <div class="form-group">
                <label for="destination-id">Destination Nexus ID:</label>
                <input type="number" id="destination-id" min="0">
            </div>
            <div class="modal-buttons">
                <button id="submit-optio">Submit (0.00004 ETH)</button>
                <button id="cancel-optio">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Modal for name registration -->
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2>Register Name</h2>
            <div class="form-group">
                <label for="name-input">Choose a name:</label>
                <input type="text" id="name-input" maxlength="32" placeholder="Enter your name...">
                <div class="character-count">0/32</div>
            </div>
            <div class="modal-buttons">
                <button id="submit-name">Register</button>
                <button id="cancel-name">Cancel</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
